<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <title>Cyber Portfolio | {{ user.name }}</title>
</head>
<body class="bg-[#050505] text-cyan-400 font-['Orbitron'] p-10 min-h-screen">
    <div class="max-w-4xl mx-auto border-l-4 border-fuchsia-600 pl-10 relative">
        
        <div class="absolute -top-5 -left-1 bg-fuchsia-600 text-black text-[10px] font-black px-2 py-1 uppercase tracking-widest">
            Vasantha IT Lab // System.Active
        </div>

        <h1 class="text-7xl font-black mb-2 uppercase tracking-tighter text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.3)]">
            {{ user.name }}
        </h1>
        <p class="text-fuchsia-500 text-xl mb-10 font-bold tracking-[0.3em] uppercase">> ARCHITECT_LOGGED_IN</p>
        
        <div class="bg-fuchsia-600/5 p-8 rounded-tr-3xl border-t border-r border-fuchsia-600/30 mb-10 backdrop-blur-sm">
            <p class="text-slate-300 text-2xl leading-relaxed italic">"{{ user.bio }}"</p>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            {% for skill in user.skills %}
            <div class="border border-cyan-400/30 px-4 py-3 bg-cyan-950/20 hover:border-cyan-400 hover:bg-cyan-400 hover:text-black transition-all duration-300 group cursor-none">
                <span class="text-[10px] block text-cyan-600 group-hover:text-black mb-1">SKL_REF//0{{ loop.index }}</span>
                <span class="font-bold tracking-widest">{{ skill.strip() }}</span>
            </div>
            {% endfor %}
        </div>

        <div class="mt-20 pt-10 border-t border-slate-900 text-[10px] text-slate-600 tracking-widest uppercase">
            Built at S.V.N College Madurai // Verified IT Architect
        </div>
    </div>
    <div class="fixed bottom-8 right-8 no-print">
    <button onclick="window.print()" class="bg-emerald-500 hover:bg-emerald-400 text-black font-black px-6 py-3 rounded-full shadow-[0_0_20px_rgba(16,185,129,0.4)] transition-all flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        Save Portfolio PDF
    </button>
</div>

<style>
    @media print {
        .no-print { display: none !important; }
        body { background: white !important; color: black !important; }
    }
</style>
<div class="fixed bottom-24 right-8 no-print">
    <button onclick="copyPortfolioLink()" class="bg-blue-600 hover:bg-blue-500 text-white font-black px-6 py-3 rounded-full shadow-[0_0_20px_rgba(37,99,235,0.4)] transition-all flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
        </svg>
        <span id="shareText">Share Link</span>
    </button>
</div>

<script>
function copyPortfolioLink() {
    // This gets the current URL of the page
    const dummy = document.createElement('input');
    const text = window.location.href;
    
    document.body.appendChild(dummy);
    dummy.value = text;
    dummy.select();
    document.execCommand('copy');
    document.body.removeChild(dummy);
    
    // Visual feedback that it worked
    const shareBtn = document.getElementById('shareText');
    shareBtn.innerText = 'Copied! ✅';
    setTimeout(() => { shareBtn.innerText = 'Share Link'; }, 2000);
}
</script>
</body>
</html>
