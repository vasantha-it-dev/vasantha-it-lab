<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Cinematic Portfolio | {{ user.name }}</title>
</head>
<body class="bg-[#020617] text-white min-h-screen p-10 font-sans selection:bg-emerald-500 selection:text-black">
    <div class="max-w-5xl mx-auto">
        
        <header class="flex justify-between items-center mb-20 border-b border-slate-800 pb-6">
            <div class="text-emerald-500 font-black tracking-tighter text-xl italic uppercase">
                VASANTHA_ARCHITECT_LOG // 2026
            </div>
            <div class="text-[10px] text-slate-500 uppercase tracking-[0.5em] font-bold">Madurai, India</div>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-2 gap-16 items-center mb-24">
            <div class="animate-in fade-in slide-in-from-left duration-1000">
                <h1 class="text-8xl font-black tracking-tighter mb-6 leading-none text-white">
                    {{ user.name }}<span class="text-emerald-500">.</span>
                </h1>
                <div class="h-1 w-20 bg-emerald-500 mb-8"></div>
                <p class="text-slate-400 text-xl leading-relaxed max-w-md italic">
                    "{{ user.bio }}"
                </p>
            </div>
            
            <div class="relative group">
                <div class="absolute -inset-1 bg-gradient-to-r from-emerald-600 to-emerald-900 rounded-3xl blur opacity-20 group-hover:opacity-40 transition duration-1000"></div>
                
                <div class="relative bg-slate-900/50 border border-slate-800 p-10 rounded-3xl backdrop-blur-xl">
                    <div class="flex items-center gap-2 text-emerald-500 mb-6 font-mono text-sm tracking-widest uppercase">
                        <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                        Technical_Stack
                    </div>
                    
                    <div class="flex flex-wrap gap-3">
                        {% for skill in user.skills %}
                        <span class="bg-emerald-500/5 border border-emerald-500/20 text-emerald-400 px-5 py-2 rounded-xl text-xs font-bold uppercase tracking-widest hover:bg-emerald-500 hover:text-black transition-all cursor-default">
                            {{ skill.strip() }}
                        </span>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </main>

        <footer class="mt-20 pt-10 border-t border-slate-900 flex flex-col md:flex-row justify-between items-center opacity-60">
            <p class="text-[10px] tracking-[0.3em] uppercase font-bold text-slate-500">
                Verified IT Student @ S.V.N College Madurai
            </p>
            <a href="/" class="text-xs font-black text-emerald-500 hover:text-white transition-colors flex items-center gap-2">
                ← CREATE ANOTHER
            </a>
        </footer>
    </div>
    <div class="fixed bottom-8 right-8 no-print">
    <button onclick="window.print()" class="bg-emerald-500 hover:bg-emerald-400 text-black font-black px-6 py-3 rounded-full shadow-[0_0_20px_rgba(16,185,129,0.4)] transition-all flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        Save Portfolio PDF
    </button>
</div>

<style>
    @media print {
        .no-print { display: none !important; }
        body { background: white !important; color: black !important; }
    }
</style>
<div class="fixed bottom-24 right-8 no-print">
    <button onclick="copyPortfolioLink()" class="bg-blue-600 hover:bg-blue-500 text-white font-black px-6 py-3 rounded-full shadow-[0_0_20px_rgba(37,99,235,0.4)] transition-all flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
        </svg>
        <span id="shareText">Share Link</span>
    </button>
</div>

<script>
function copyPortfolioLink() {
    // This gets the current URL of the page
    const dummy = document.createElement('input');
    const text = window.location.href;
    
    document.body.appendChild(dummy);
    dummy.value = text;
    dummy.select();
    document.execCommand('copy');
    document.body.removeChild(dummy);
    
    // Visual feedback that it worked
    const shareBtn = document.getElementById('shareText');
    shareBtn.innerText = 'Copied! ✅';
    setTimeout(() => { shareBtn.innerText = 'Share Link'; }, 2000);
}
</script>
</body>
</html>
